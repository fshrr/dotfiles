# ~/.config/tmux/tmux.conf
# Standalone config. See docs/superpowers/specs/2026-04-14-tmux-rewrite-design.md.

# -- prefix --------------------------------------------------------------------

unbind C-b
set -g prefix "`"
bind "`" last-window           # double-tap prefix -> last window

# -- options -------------------------------------------------------------------

set -g mouse on
set -g history-limit 10000
set -g status-position bottom
set -g escape-time 10
set -g mode-keys vi

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,*:Tc"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# -- pane navigation (vim) -----------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- pane splitting (capital = direction of new pane) --------------------------

unbind '"'
unbind %
bind H split-window -hb -c '#{pane_current_path}'   # new pane on the left
bind J split-window -v  -c '#{pane_current_path}'   # new pane below
bind K split-window -vb -c '#{pane_current_path}'   # new pane above
bind L split-window -h  -c '#{pane_current_path}'   # new pane on the right

# -- windows (tabs) ------------------------------------------------------------

bind n new-window -c '#{pane_current_path}'
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9
bind s choose-session -Z
bind S choose-tree -Z

# -- move pane -----------------------------------------------------------------
# m <1-9> : join current pane into existing window N as side-by-side split (focus follows)
# m 0     : break current pane into a new window at the end
# M       : break current pane into a new window right after current
# w       : swap window layout between side-by-side and stacked

bind m switch-client -T move-pane
bind -T move-pane 1 join-pane -h -t :1 \; select-window -t :1
bind -T move-pane 2 join-pane -h -t :2 \; select-window -t :2
bind -T move-pane 3 join-pane -h -t :3 \; select-window -t :3
bind -T move-pane 4 join-pane -h -t :4 \; select-window -t :4
bind -T move-pane 5 join-pane -h -t :5 \; select-window -t :5
bind -T move-pane 6 join-pane -h -t :6 \; select-window -t :6
bind -T move-pane 7 join-pane -h -t :7 \; select-window -t :7
bind -T move-pane 8 join-pane -h -t :8 \; select-window -t :8
bind -T move-pane 9 join-pane -h -t :9 \; select-window -t :9
bind -T move-pane 0 break-pane
bind M break-pane -a

bind w if-shell "tmux display -p '#{window_layout}' | grep -q '\\['" \
  "select-layout even-horizontal" \
  "select-layout even-vertical"

# -- reload --------------------------------------------------------------------

bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# -- theme (ANSI palette; tracks Ghostty light/dark) ---------------------------
# Slots: 0=dim-bg  3=yellow/warn  4=blue/accent  7=fg  8=subtle

set -g status-style "bg=colour0,fg=colour8"
set -g status-left  "#[fg=colour4,bold] #S #[default] "
set -g status-right "#{?client_prefix,#[fg=colour3]⌨ ,}#[fg=colour8]%H:%M #[fg=colour4]#h "
set -g status-left-length 30
set -g status-right-length 60

setw -g window-status-format         " #I #W "
setw -g window-status-current-format "#[fg=colour7,bg=colour4,bold] #I #W #[default]"
setw -g window-status-activity-style "fg=colour3"

set -g pane-border-style        "fg=colour8"
set -g pane-active-border-style "fg=colour4"

set -g message-style         "fg=colour0,bg=colour3,bold"
set -g message-command-style "fg=colour3,bg=colour0,bold"
setw -g mode-style           "fg=colour0,bg=colour3,bold"
