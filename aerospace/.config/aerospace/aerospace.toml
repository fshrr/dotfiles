config-version = 2

after-startup-command = []
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ["0", "G", "E", "Z", "C", "H", "F", "N", "S", "O"]

on-mode-changed = []

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 8
    inner.vertical =   8
    outer.left =       8
    outer.bottom =     8
    outer.top =        0
    outer.right =      8

# Pin workspaces to monitors
# 'main' = Gigabyte (macOS main display), 'secondary' = LG
[workspace-to-monitor-force-assignment]
"0" = ['main', 'secondary', 'built-in']
G   = 'main'
E   = 'main'
Z   = 'main'
C   = 'main'
H   = 'secondary'
F   = 'secondary'
N   = 'secondary'
S   = 'secondary'
O   = 'secondary'

# App → workspace routing (order matters: catch-all must be last)
[[on-window-detected]]
if.app-name-regex-substring = 'Ghostty'
run = 'move-node-to-workspace G'

[[on-window-detected]]
if.app-name-regex-substring = 'Zed'
run = 'move-node-to-workspace E'

[[on-window-detected]]
if.app-name-regex-substring = 'Zen'
run = 'move-node-to-workspace Z'

[[on-window-detected]]
if.app-name-regex-substring = 'Claude'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-name-regex-substring = 'Perplexity'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-name-regex-substring = 'Helium'
run = 'move-node-to-workspace H'

[[on-window-detected]]
if.app-name-regex-substring = 'Figma'
run = 'move-node-to-workspace F'

[[on-window-detected]]
if.app-name-regex-substring = 'Notion'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-name-regex-substring = 'Slack'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-name-regex-substring = 'Obsidian'
run = 'move-node-to-workspace O'

# Catch-all: everything else goes to workspace 0, floating
[[on-window-detected]]
run = ['move-node-to-workspace 0', 'layout floating']

[mode.main.binding]
    # Layout toggles
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    # Focus (vim-style)
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # Move window
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # Move window to workspace
    alt-shift-0 = 'move-node-to-workspace 0'
    alt-shift-g = 'move-node-to-workspace G'
    alt-shift-e = 'move-node-to-workspace E'
    alt-shift-z = 'move-node-to-workspace Z'
    alt-shift-c = 'move-node-to-workspace C'
    alt-shift-f = 'move-node-to-workspace F'
    alt-shift-n = 'move-node-to-workspace N'
    alt-shift-s = 'move-node-to-workspace S'
    alt-shift-o = 'move-node-to-workspace O'

    # Back and forth, move workspace to monitor
    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Reset all windows to their assigned workspaces
    alt-shift-r = 'exec-and-forget ~/.config/aerospace/reset-workspaces.sh'

    # Enter service mode
    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']
