config-version = 2

after-startup-command = []
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'accordion'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ["0", "9", "G", "E", "Z", "C", "H", "F", "N", "S", "O"]

on-mode-changed = []

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 8
    inner.vertical =   8
    outer.left =       8
    outer.bottom =     8
    outer.top =        0
    outer.right =      8

# Pin workspaces to monitors
# 'main' = Gigabyte (macOS main display), 'secondary' = LG
[workspace-to-monitor-force-assignment]
E   = 'main'
Z   = 'main'
H   = 'secondary'
F   = 'secondary'
N   = 'secondary'
S   = 'secondary'
O   = 'secondary'

# App → workspace routing (order matters: catch-all must be last)
[[on-window-detected]]
if.app-name-regex-substring = 'Ghostty'
run = 'move-node-to-workspace G'

[[on-window-detected]]
if.app-name-regex-substring = 'Zed'
run = 'move-node-to-workspace E'

[[on-window-detected]]
if.app-name-regex-substring = 'Zen'
run = 'move-node-to-workspace Z'

[[on-window-detected]]
if.app-name-regex-substring = 'Claude'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-name-regex-substring = 'Perplexity'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-name-regex-substring = 'Helium'
run = 'move-node-to-workspace H'

[[on-window-detected]]
if.app-name-regex-substring = 'Figma'
run = 'move-node-to-workspace F'

[[on-window-detected]]
if.app-name-regex-substring = 'Notion'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-name-regex-substring = 'Slack'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-name-regex-substring = 'Obsidian'
run = 'move-node-to-workspace O'

# Catch-all: everything else goes to workspace 0, floating
[[on-window-detected]]
run = ['move-node-to-workspace 0', 'layout floating']

[mode.main.binding]
    # Switch to workspace
    ctrl-alt-cmd-g = 'workspace G'
    ctrl-alt-cmd-e = 'workspace E'
    ctrl-alt-cmd-z = 'workspace Z'
    ctrl-alt-cmd-c = 'workspace C'
    ctrl-alt-cmd-h = 'workspace H'
    ctrl-alt-cmd-f = 'workspace F'
    ctrl-alt-cmd-n = 'workspace N'
    ctrl-alt-cmd-s = 'workspace S'
    ctrl-alt-cmd-o = 'workspace O'
    ctrl-alt-cmd-0 = 'workspace 0'
    ctrl-alt-cmd-9 = 'workspace 9'
    # Cycle forward through windows in current workspace
    ctrl-alt-cmd-tab = 'focus dfs-next'

    # Move current workspace to next monitor
    ctrl-alt-cmd-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Move current window to workspace
    ctrl-alt-cmd-shift-g = 'move-node-to-workspace G'
    ctrl-alt-cmd-shift-e = 'move-node-to-workspace E'
    ctrl-alt-cmd-shift-z = 'move-node-to-workspace Z'
    ctrl-alt-cmd-shift-c = 'move-node-to-workspace C'
    ctrl-alt-cmd-shift-h = 'move-node-to-workspace H'
    ctrl-alt-cmd-shift-f = 'move-node-to-workspace F'
    ctrl-alt-cmd-shift-n = 'move-node-to-workspace N'
    ctrl-alt-cmd-shift-s = 'move-node-to-workspace S'
    ctrl-alt-cmd-shift-o = 'move-node-to-workspace O'
    ctrl-alt-cmd-shift-0 = 'move-node-to-workspace 0'
    ctrl-alt-cmd-shift-9 = 'move-node-to-workspace 9'

    # Toggle layout tiles <-> accordion
    ctrl-alt-cmd-minus = 'layout tiles accordion'

    # Reset all windows to their assigned workspaces
    ctrl-alt-cmd-shift-r = 'exec-and-forget ~/.config/aerospace/reset-workspaces.sh'

    # Service mode — commented out, uncomment if needed
    # ctrl-alt-cmd-shift-semicolon = 'mode service'

